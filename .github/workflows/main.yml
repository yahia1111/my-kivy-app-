name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libsqlite3-dev libgdbm-dev libssl-dev libbz2-dev libreadline-dev libmhash-dev libffi-dev

      - name: Setup Android SDK Tools
        uses: android-actions/setup-android@v3

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "cython<3.0" buildozer virtualenv

      - name: Inject SDK Tools and Build
        run: |
          # 1. تجهيز مجلدات الـ SDK والـ Licenses
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          
          # 2. ربط الـ sdkmanager السحابي
          ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager || true
          
          # 3. قبول التراخيص ومزامنتها
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          cp -r $ANDROID_HOME/licenses/* ~/.buildozer/android/platform/android-sdk/licenses/ || true
          
          # 4. تمرير متغيرات البيئة للـ SDK
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export ANDROID_HOME=$ANDROID_HOME
          
          # 5. تنظيف مخلفات الكاش القديمة يدوياً عبر النظام لتفادي خطأ بيلدوزر
          rm -rf .buildozer/
          
          # 6. إطلاق البناء النهائي المباشر لـ APK
          buildozer -v android debug

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
