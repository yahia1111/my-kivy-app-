name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libsqlite3-dev libgdbm-dev libssl-dev libbz2-dev libreadline-dev libmhash-dev libffi-dev

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "cython<3.0" buildozer virtualenv

      - name: Hack Buildozer SDK Layout (خدعة المسار القاطعة)
        run: |
          # 1. إنشاء المجلدات المخفية التي ستبحث عنها أداة بيلدوزر محلياً
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          
          # 2. عمل رابط ذكي يربط الـ sdkmanager السحابي الحقيقي بالمسار القديم الذي تبحث عنه الأداة
          ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager || true
          
          # 3. الموافقة التلقائية على التراخيص ومزامنتها داخل مجلد بيلدوزر
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          cp -r $ANDROID_HOME/licenses/* ~/.buildozer/android/platform/android-sdk/licenses/ || true

      - name: Build Android APK
        run: |
          # تمرير المسارات لضمان التزامن
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export ANDROID_HOME=$ANDROID_HOME
          
          # إطلاق أمر البناء النهائي
          buildozer -v android debug

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: my-android-app
          path: bin/*.apk
