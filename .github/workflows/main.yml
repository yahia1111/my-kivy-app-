name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # 1. تهيئة جافا 17 المستقرة والمتوافقة
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة بيئة بايثون 3.10
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. تثبيت كافة الاعتماديات الأساسية لنظام Linux
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libsqlite3-dev libgdbm-dev libssl-dev libbz2-dev libreadline-dev libmhash-dev libffi-dev aidl

      # 4. تثبيت بيلدوزر والنسخة المتوافقة لـ Cython
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "cython<3.0" buildozer virtualenv

      # 5. البناء التلقائي النظيف مع تفعيل القبول الإجباري الصامت لكافة شروط جوجل وأندرويد
      - name: Build with Buildozer Auto-SDK
        run: |
          # تنظيف إعدادات المسارات المخصصة ليعتمد بيلدوزر على نفسه
          sed -i 's/^android.sdk_path =.*/#android.sdk_path =/' buildozer.spec || true
          sed -i 's/^android.ndk_path =.*/#android.ndk_path =/' buildozer.spec || true
          
          # مسح كاش البناء القديم تماماً لتفادي تداخل الملفات التالفة
          rm -rf .buildozer/
          rm -rf ~/.buildozer/
          
          # الخدعة السحرية: محاكاة كتابة "y" وضغط Enter تلقائياً بشكل لانهائي للموافقة على رخص جوجل فور ظهورها
          # هذا السطر سيجعل بيلدوزر يتخطى شاشة (Accept? (y/N)) ويبني حزمة الـ APK مباشرة
          yes | buildozer -v android debug

      # 6. رفع ملف الـ APK النهائي النظيف لحسابك للتحميل فوراً
      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
