import os
from kivy.app import App
from kivy.uix.boxlayout import BoxLayout
from kivy.uix.button import Button
from kivy.core.audio import SoundLoader
from kivy.utils import platform

class MyGameApp(App):
    def build(self):
        # شاشة رئيسية مبسطة تحتوي على زر تشغيل الصوت كمثال
        layout = BoxLayout(orientation='vertical', padding=20, spacing=20)
        
        btn_play = Button(text="تشغيل الموسيقى", size_hint=(1, 0.2))
        btn_play.bind(on_press=self.play_music)
        
        layout.add_widget(btn_play)
        
        # ⚠️ ضع هنا عناصر تصميمك القديم بالكامل (أزرار، صور، إلخ)
        # مثال: layout.add_widget(your_old_widget)
        
        return layout

    def on_start(self):
        """طلب صلاحيات ذاكرة الهاتف فور فتح التطبيق على الأندرويد لمنع الإغلاق المفاجئ"""
        if platform == 'android':
            try:
                from android.permissions import request_permissions, Permission
                request_permissions([
                    Permission.READ_EXTERNAL_STORAGE, 
                    Permission.WRITE_EXTERNAL_STORAGE
                ])
            except Exception as e:
                print("خطأ في طلب التصاريح:", e)

    def play_music(self, instance):
        """دالة تشغيل الموسيقى بمسار نسبي مباشر متوافق مع الأندرويد"""
        # تأكد أن ملف الموسيقى بجوار الـ main.py مباشرة على الجيت هاب
        sound_file = 'music.mp3' 
        
        if os.path.exists(sound_file):
            sound = SoundLoader.load(sound_file)
            if sound:
                sound.play()
        else:
            print(f"الملف {sound_file} غير موجود في هذا المسار!")

if __name__ == '__main__':
    MyGameApp().run()
