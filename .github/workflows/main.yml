name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libsqlite3-dev libgdbm-dev libssl-dev libbz2-dev libreadline-dev libmhash-dev libffi-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "cython<3.0" buildozer virtualenv

      - name: Build with Buildozer Auto-SDK
        run: |
          # 1. إزالة أي مسارات قديمة أو معلقة في ملف buildozer.spec ليعتمد على التثبيت الآلي النظيف
          sed -i 's/^android.sdk_path =.*/#android.sdk_path =/' buildozer.spec || true
          sed -i 's/^android.ndk_path =.*/#android.ndk_path =/' buildozer.spec || true
          
          # 2. تنظيف مجلد بيلدوزر بالكامل لبدء عملية بناء نظيفة من الصفر
          rm -rf .buildozer/
          rm -rf ~/.buildozer/
          
          # 3. تشغيل البناء المباشر (سيقوم بيلدوزر هنا بتحميل الإصدارات المتوافقة معه تماماً تلقائياً)
          buildozer -v android debug

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
