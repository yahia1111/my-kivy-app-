name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # 1. تهيئة جافا 17 المتوافقة مع أدوات أندرويد الحديثة
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 2. تهيئة بيئة بايثون 3.10 المستقرة
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. تثبيت كافة الاعتماديات المساعدة لنظام التشغيل Linux
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libsqlite3-dev libgdbm-dev libssl-dev libbz2-dev libreadline-dev libmhash-dev libffi-dev aidl

      # 4. تثبيت بيلدوزر والنسخة المتوافقة لـ Cython
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "cython<3.0" buildozer virtualenv

      # 5. تنظيف الكاش وبدء البناء الآلي النظيف تماماً عبر بيلدوزر
      - name: Build with Buildozer Auto-SDK
        run: |
          # تنظيف كامل وإزالة أي مسارات يدوية قديمة قد تسبب تضارب
          sed -i 's/^android.sdk_path =.*/#android.sdk_path =/' buildozer.spec || true
          sed -i 's/^android.ndk_path =.*/#android.ndk_path =/' buildozer.spec || true
          
          rm -rf .buildozer/
          rm -rf ~/.buildozer/
          
          # إطلاق عملية التجميع؛ سيقوم بيلدوزر بتحميل أدواته المتوافقة تلقائياً وقبول التراخيص
          buildozer -v android debug

      # 6. رفع ملف الـ APK النهائي لحسابك
      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
