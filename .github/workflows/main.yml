name: Build Android APK
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies & Android SDK tools
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libsqlite3-dev libgdbm-dev libssl-dev libbz2-dev libreadline-dev libmhash-dev libffi-dev google-android-sdk-installer sdkmanager

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "cython<3.0" buildozer virtualenv

    - name: Link SDK Manager for Buildozer
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
        if [ -f /usr/bin/sdkmanager ]; then
          ln -s /usr/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        elif [ -f /usr/lib/android-sdk/tools/bin/sdkmanager ]; then
          ln -s /usr/lib/android-sdk/tools/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        fi

    - name: Auto-Accept Android SDK Licenses
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo -e "2446ae9a69314158347e1222d19f51f3d4359645\n4650c28b46335acc4a46fa0c90829f8340368f34\n230b92cd3465357161b47ff077af520344564613" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7ece6a5ceee62175e156464728b6" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

    - name: Build Android APK
      run: |
        buildozer -v android debug

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app
        path: bin/*.apk
