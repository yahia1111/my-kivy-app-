name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-11-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libsqlite3-dev libgdbm-dev libssl-dev libbz2-dev libreadline-dev libmhash-dev libffi-dev aidl

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "cython<3.0" buildozer virtualenv

      - name: Pre-install Stable Android SDK and Build
        run: |
          # 1. تنظيف أي مسارات قديمة أو كاش تالف
          rm -rf .buildozer/
          rm -rf ~/.buildozer/
          
          # 2. إنشاء الهيكل الداخلي لمجلدات أندرويد التي يتوقعها بيلدوزر بدقة
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          
          # 3. تحميل وتثبيت أدوات السطر البرمجي الرسمية المستقرة من جوجل مباشرة
          wget -q https://google.com -O cmdline.zip
          unzip -q cmdline.zip
          mv cmdline-tools/* ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/
          
          # 4. الموافقة الإجبارية والشاملة على كافة تراخيص الـ SDK برمجياً
          yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=/home/runner/.buildozer/android/platform/android-sdk --licenses || true
          
          # 5. التنزيل والتثبيت المسبق لنسخة أدوات البناء المستقرة 33.0.1 لمنع تحميل نسخة 37
          ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=/home/runner/.buildozer/android/platform/android-sdk "build-tools;33.0.1" "platforms;android-33" "platform-tools" || true
          
          # 6. إطلاق التجميع النهائي المباشر والآمن للـ APK
          buildozer -v android debug

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
