name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libsqlite3-dev libgdbm-dev libssl-dev libbz2-dev libreadline-dev libmhash-dev libffi-dev

      - name: Setup Android SDK Tools
        uses: android-actions/setup-android@v3

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "cython<3.0" buildozer virtualenv

      - name: Inject SDK Tools and Build
        run: |
          # 1. إجبار وتحديث ملف buildozer.spec لقراءة مسارات الـ SDK والـ NDK الحقيقية للسيرفر
          sed -i "s|#android.sdk_path =.*|android.sdk_path = /usr/local/lib/android/sdk|g" buildozer.spec
          sed -i "s|#android.ndk_path =.*|android.ndk_path = /usr/local/lib/android/sdk/ndk/27.3.13750724|g" buildozer.spec
          
          # 2. إنشاء وتأمين الروابط المباشرة داخل مجلد بيلدوزر الافتراضي كخطة بديلة
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          mkdir -p ~/.buildozer/android/platform/android-sdk/platform-tools
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          
          ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager || true
          ln -s $ANDROID_HOME/platform-tools/adb ~/.buildozer/android/platform/android-sdk/platform-tools/adb || true
          
          # 3. قبول التراخيص القانونية ومزامنتها
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          cp -r $ANDROID_HOME/licenses/* ~/.buildozer/android/platform/android-sdk/licenses/ || true
          
          # 4. تفعيل متغيرات البيئة للـ Compiler والـ PATH
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export ANDROID_HOME=$ANDROID_HOME
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          
          # 5. تنظيف أي كاش يدوي قديم
          rm -rf .buildozer/
          
          # 6. بدء البناء الفعلي المباشر
          buildozer -v android debug

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
