name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libsqlite3-dev libgdbm-dev libssl-dev libbz2-dev libreadline-dev libmhash-dev libffi-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "cython<3.0" buildozer virtualenv

      - name: Build Android APK (الدمج القاطع للمسارات)
        run: |
          # إجبار بيلدوزر على استخدام الـ SDK والـ NDK المدمجين بالسيرفر واللذان لا يخطئان أبداً
          mkdir -p ~/.buildozer/android/platform
          ln -s $ANDROID_HOME ~/.buildozer/android/platform/android-sdk || true
          
          # إجبار بيلدوزر على قبول التراخيص محلياً وسحابياً
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          cp -r $ANDROID_HOME/licenses/* ~/.buildozer/android/platform/android-sdk/licenses/ || true
          
          # تشغيل البناء النهائي المستقر
          buildozer -v android debug

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: my-android-app
          path: bin/*.apk
